version: 3

tasks:
  sync:
    cmds:
      - helmfile sync
    desc: "Sync ArgoCD with Helmfile"

  apply:clusters:
    cmds:
      - kubectl apply -f manifests/clusters

  apply:project:
    cmds:
      - kubectl apply -f manifests/project.yaml
    desc: "Apply ArgoCD project manifest"

  apply:app-of-apps:
    cmds:
      - kubectl apply -f manifests/app-of-apps.yaml
    desc: "Apply ArgoCD Application of Applications manifest"

  port-forward:
    cmds:
      - kubectl port-forward svc/argocd-server -n argocd 8080:443
    desc: "Port forward ArgoCD server to localhost:8080"

  ui:
    cmds:
      - open http://localhost:8080
    desc: "Open ArgoCD UI in the browser"

  commit:
    cmds:
      - git add .
      - git commit -m "Update ArgoCD configuration"
      - git push origin main
    desc: "Commit changes to Git"
