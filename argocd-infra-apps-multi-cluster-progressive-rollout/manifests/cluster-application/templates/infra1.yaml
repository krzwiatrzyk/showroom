apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/krzwiatrzyk/showroom.git
    targetRevision: HEAD
    path: argocd-infra-apps-multi-cluster-progressive-rollout/app
    helm:
      releaseName: infra1
  destination:
    name: "{{ .Values.cluster }}"
    namespace: infra1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
