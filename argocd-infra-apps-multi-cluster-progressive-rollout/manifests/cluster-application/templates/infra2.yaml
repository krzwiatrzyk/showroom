apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra2
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://ealenn.github.io/charts
    chart: echo-server
    targetRevision: 0.5.0
    helm:
      releaseName: infra2
  destination:
    name: "{{ .Values.cluster }}"
    namespace: infra2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
