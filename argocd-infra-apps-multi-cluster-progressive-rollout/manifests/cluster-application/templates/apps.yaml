apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/krzwiatrzyk/showroom.git
        revision: HEAD
        files:
          - path: "argocd-infra-apps-multi-cluster-progressive-rollout/apps/*.yaml"
  template:
    metadata:
      name: {{ `"{{ .name }}"` }}
    spec:
      project: default
      source:
        repoURL: https://ealenn.github.io/charts
        chart: echo-server
        targetRevision: 0.5.0
        helm:
          releaseName: {{ `"{{ .name }}"` }}
      destination:
        name: {{ .Values.cluster | quote }}
        namespace: {{ `"{{ .name }}"` }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
