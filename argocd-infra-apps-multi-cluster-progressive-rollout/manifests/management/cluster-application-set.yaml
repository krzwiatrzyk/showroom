apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clusters
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: clusterType
              operator: In
              values:
                - beta
        - matchExpressions:
            - key: clusterType
              operator: In
              values:
                - web
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: "cluster-{{ .name }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        clusterType: '{{ index .metadata.labels "type" }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/krzwiatrzyk/showroom.git
        targetRevision: HEAD
        path: argocd-infra-apps-multi-cluster-progressive-rollout/manifests/cluster-application
        helm:
          releaseName: "cluster-{{ .name }}"
          valuesObject:
            cluster: "{{ .name }}"
      destination:
        name: in-cluster
        namespace: "cluster-{{ .name }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
