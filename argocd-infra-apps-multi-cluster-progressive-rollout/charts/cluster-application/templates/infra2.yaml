apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra2
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/krzwiatrzyk/showroom.git
    targetRevision: HEAD
    path: argocd-infra-apps-multi-cluster-progressive-rollout/charts/app
    helm:
      releaseName: infra2
  destination:
    name: "{{ .Values.cluster }}"
    namespace: "{{ .Values.cluster }}-infra2"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
