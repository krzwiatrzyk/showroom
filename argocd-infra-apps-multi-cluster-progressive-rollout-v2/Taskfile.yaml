version: 3

tasks:
  infra-ready:setup:
    silent: true
    vars:
      GITHUB_TOKEN: gopass show infra-ready/GITHUB_TOKEN
    cmds:
      - kubectl create ns beta1-infra-ready || true
      - kubectl create secret generic github-token -n beta1-infra-ready --from-literal=token=${GITHUB_TOKEN} || true
      - kubectl create ns web1-infra-ready || true
      - kubectl create secret generic github-token -n web1-infra-ready --from-literal=token=${GITHUB_TOKEN} || true
      - kubectl create ns web2-infra-ready || true
      - kubectl create secret generic github-token -n web2-infra-ready --from-literal=token=${GITHUB_TOKEN} || true

  sync:
    cmds:
      - helmfile sync
    desc: "Sync ArgoCD with Helmfile"

  apply:clusters:
    cmds:
      - kubectl apply -f manifests/clusters

  apply:project:
    cmds:
      - kubectl apply -f manifests/project.yaml
    desc: "Apply ArgoCD project manifest"

  apply:app-of-apps:
    cmds:
      - kubectl apply -f manifests/app-of-apps.yaml
    desc: "Apply ArgoCD Application of Applications manifest"

  port-forward:
    cmds:
      - kubectl port-forward svc/argocd-server -n argocd 8080:443
    desc: "Port forward ArgoCD server to localhost:8080"

  ui:
    cmds:
      - open http://localhost:8080
    desc: "Open ArgoCD UI in the browser"

  commit:
    cmds:
      - git add .
      - git commit -m "Update ArgoCD configuration"
      - git push origin main
    desc: "Commit changes to Git"
