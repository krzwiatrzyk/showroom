apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-hello-world
  labels:
    app: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      containers:
        - name: hello-world
          image: busybox:latest
          command: ["sh", "-c", "echo 'Hello World'"]
